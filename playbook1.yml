- name: install and run nginx
  hosts: web
  become: yes
  tasks:
  - name: stop nginx
    ansible.builtin.service:
      name: nginx
      state: stopped
      enabled: no
  - name: uninstall nginx package
    ansible.builtin.dnf:
      name: nginx
      state: absent
  - name: verify nginx is removed
    ansible.builtin.command: rpm -q nginx
    register: nginx_status
    ignore_errors: true

  - name: print result
    ansible.builtin.debug:
      var: nginx_status.stderr_lines