- name: filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible
    myIp1: "300.23.89.123"
    myIp2: "192.23.89.123"
    myIp3: "300.23.89.123"
    tagsmap: 
      name: ansible
      project: roboshop
      component: with aws
    tagslist: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "with aws"
        }
    ]
  tasks:
  - name: greeting
    ansible.builtin.debug:
     msg: "Hello Harshavardhan, {{ Greeting | default('Good Morning') }}"
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  - name: map to list
    ansible.builtin.debug:
      msg: "{{ tagsmap | dict2items }}"
  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ tagslist | items2dict }}"
  - name: convert to lower case any file content from inventory
    ansible.builtin.debug:
      msg: "{{ COURSE | lower }}"
  - name: convert to upper case any file content from inventory
    ansible.builtin.debug:
      msg: "{{ COURSE | upper }}"
  - name: convert to lower case any file content
    ansible.builtin.debug:
      msg: "{{ lookup('file', 'COURSE.YML') | lower }}"
  - name: convert to upper case any file content
    ansible.builtin.debug:
      msg: "{{ lookup('file', 'COURSE.YML') | upper }}"
  - name: read students yaml
    ansible.builtin.set_fact: # setting the variable
      student_yaml: "{{ lookup('file', 'students.yaml' ) | from_yaml }}"
  - name: convert YAML to JSON
    ansible.builtin.debug:
      msg: "{{ student_yaml | to_nice_json  }}"
  - name: check first ipv4
    ansible.builtin.debug:
      msg: "{{ myIp1 | ansible.utils.ipv4 }}"
  - name: check second ipv4
    ansible.builtin.debug:
      msg: "{{ myIp2 | ansible.utils.ipv4 }}"
  - name: check third ipv6
    ansible.builtin.debug:
      msg: "{{ myIp3 | ansible.utils.ipv6 }}"