- name: filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible
    tags: 
      name: ansible
      project: roboshop
      component: with aws
  tasks:
  - name: greeting
    ansible.builtin.debug:
     msg: "Hello Harshavardhan, {{ Greeting | default('Good Morning') }}"
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  - name: map to list
    ansible.builtin.debug:
      msg: "{{ topics | dict2items }}"